name: Metrics

on:
  # 毎日 00:15 UTC（= 日本時間 09:15）に再生成
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate metrics.svg
        uses: lowlighter/metrics@latest
        with:
          # 個人用クラシックPAT（repo / read:org / read:user）をリポジトリ Secrets に METRICS_TOKEN として登録すること
          token: ${{ secrets.METRICS_TOKEN }}
          user: ikuma-hiroyuki
          filename: github-metrics.svg
          template: classic
          config_timezone: Asia/Tokyo

          # ── 基本パネル ──
          base: header, activity, community, repositories, metadata

          # ── habits：コーディング傾向（旧 trophy 枠の代替・潰れない） ──
          # ※ achievements プラグインは GitHub の Projects(classic) 廃止により upstream 故障中のため不採用
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # ── 言語内訳 ──
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # ── 1年分のコントリビューションを立体カレンダー表示 ──
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
